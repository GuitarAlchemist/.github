name: Epic
description: Large feature or theme.
title: "[Epic] "
labels: ["level:epic"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What is the high-level goal of this epic?
    validations:
      required: true
  - type: textarea
    id: issue_meta
    attributes:
      label: Issue Meta
      render: yaml
      description: Standardized metadata for cross-repo triage.
      value: |
        issue_meta:
          level: epic
          parent: null
          area: governance # runtime|research|governance|product|docs|infra
          priority: P2 # P0|P1|P2|P3
          complexity: L # XS|S|M|L|XL
          risk: low # low|medium|high
          afk:
            readiness: candidate # ready|candidate|blocked
            max_autonomy: none # none|draft|pr|comment_only
            reason: "Needs breakdown into stories"
          budget:
            tier: free-local # free-local|paid-allowed|cloud-required
            max_cost_usd: 0
            max_runner_minutes: 60
          routing:
            lane: shape # shape|loop|fix|docs|research|infra
            preferred_workers: []
          evidence_required: []
          status: ready # ready|blocked|needs_review|done
    validations:
      required: true
