name: Claude Review Diagnostics Test

on:
  pull_request:
    paths:
      - scripts/classify_claude_review.py
      - tests/test_classify_claude_review.py
      - .github/workflows/claude-code-review.yml
      - .github/workflows/claude-review-diagnostics-test.yml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test sanitized classifier
        run: python -m unittest tests/test_classify_claude_review.py -v

