name: Methodology Guard Self-Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/methodology-guard.yml'
      - '.github/actions/methodology-guard/action.yml'
      - '.github/scripts/check_methodology.py'
      - '.github/methodology/rules.yml'
      - 'tests/methodology/**'

permissions:
  contents: read

jobs:
  self-test:
    name: Self-test methodology fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Pass fixture should pass
        run: |
          BODY="$(cat tests/methodology/pass-structured-issue.md)"
          python3 .github/scripts/check_methodology.py \
            --kind issue \
            --title "Structured Issue" \
            --body "$BODY" \
            --rules-path .github/methodology/rules.yml \
            --strict

      - name: Research note should pass as advisory
        run: |
          BODY="$(cat tests/methodology/research-note.md)"
          python3 .github/scripts/check_methodology.py \
            --kind issue \
            --title "[Research] Example" \
            --body "$BODY" \
            --rules-path .github/methodology/rules.yml \
            --strict

      - name: Missing business value fixture should fail in strict mode
        run: |
          BODY="$(cat tests/methodology/fail-missing-business-value.md)"
          set +e
          python3 .github/scripts/check_methodology.py \
            --kind issue \
            --title "Incomplete Issue" \
            --body "$BODY" \
            --rules-path .github/methodology/rules.yml \
            --strict
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "Expected strict checker to fail for missing business value."
            exit 1
          fi
          echo "Strict checker failed as expected."

      - name: Composite action should run on pass fixture
        uses: ./.github/actions/methodology-guard
        with:
          kind: issue
          title: Structured Issue
          body: |
            # Summary

            Structured issue body.

            # Hierarchy

            Parent:
            - GuitarAlchemist/.github#27

            Children:
            -

            Related:
            - GuitarAlchemist/.github#28

            # Scope / boundary

            Namespace:
            - GuitarAlchemist.GitHub.Methodology.Checker

            Owner scope:
            - GuitarAlchemist/.github methodology guard

            In scope:
            - Validate issue structure.

            Out of scope:
            - Decide governance policy.

            Allowed dependencies:
            - rules.yml and issue body text.

            Forbidden dependencies:
            - repo-specific policy internals.

            Contract exposed:
            - methodology-guard.md and methodology-guard.json.

            # Business value

            Outcome:
            - Improve methodology.

            Value hypothesis:
            - Structured checks reduce drift.

            Who benefits:
            - Maintainer and agents.

            How we know it worked:
            - Guard passes.

            Risk if ignored:
            - Drift returns.

            # Review mode

            Mode:
            - fast-review

            # Routing

            Selected lane:
            - Jules

            # Non-goals

            - Runtime changes.
          strict: "true"
          rules-path: .github/methodology/rules.yml
