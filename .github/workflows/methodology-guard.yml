name: Methodology Guard

on:
  workflow_call:
    inputs:
      kind:
        description: "Artifact kind: issue or pr"
        required: true
        type: string
      title:
        description: "Issue or PR title"
        required: true
        type: string
      body:
        description: "Issue or PR body"
        required: false
        type: string
        default: ""
      strict:
        description: "Fail the workflow when required sections are missing"
        required: false
        type: boolean
        default: false
      rules-path:
        description: "Optional caller-provided methodology rules YAML path"
        required: false
        type: string
        default: ""

jobs:
  check:
    name: Check methodology
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Run methodology guard
        uses: GuitarAlchemist/.github/.github/actions/methodology-guard@main
        with:
          kind: ${{ inputs.kind }}
          title: ${{ inputs.title }}
          body: ${{ inputs.body }}
          strict: ${{ inputs.strict }}
          rules-path: ${{ inputs.rules-path }}

      - name: Upload methodology report
        uses: actions/upload-artifact@v7
        with:
          name: methodology-guard-report
          path: |
            methodology-guard.md
            methodology-guard.json
