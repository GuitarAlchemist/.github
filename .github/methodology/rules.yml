# Methodology Guard Rules
#
# This file is intentionally a tiny YAML subset so the checker can parse it
# without external Python dependencies.

issue_required_sections:
  - summary
  - hierarchy
  - scope / boundary
  - business value
  - review mode
  - routing
  - non-goals

issue_required_hierarchy_fields:
  - parent
  - children
  - related

issue_required_scope_boundary_fields:
  - namespace
  - owner scope
  - in scope
  - out of scope
  - allowed dependencies
  - forbidden dependencies
  - contract exposed

issue_required_business_value_fields:
  - outcome
  - value hypothesis
  - who benefits
  - how we know it worked
  - risk if ignored

pr_required_sections:
  - summary
  - linked issue
  - scope
  - boundary contract
  - business value
  - review mode
  - evidence
  - acceptance criteria

pr_required_boundary_fields:
  - namespace affected
  - contract changed
  - expected dependencies touched
  - dependencies intentionally avoided
  - derived state kept derived

research_markers:
  - "[research]"
  - type:research
  - research note

reference_artifacts:
  - PRODUCT_PROJECT_OPERATING_MODEL.md
  - OPERATING_GATES.md
  - ISSUE_HIERARCHY.md
  - BUSINESS_VALUE_TREE.md
  - WORKFLOW_STATE_MACHINE.md
  - COUPLING_SCOPING_NAMESPACE_PRINCIPLES.md
